name: Electron Windows Build & Release

on:
  push:
    branches:
      - main
    paths:
      - 'apps/electron/**'
    tags:
      - 'v*'

env:
  APP_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || format('{0}.{1}', '1', github.run_number) }}

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Update version in package.json
        working-directory: apps/electron
        run: |
          npm pkg set version=${{ env.APP_VERSION }}

      - name: Generate .env from secrets
        working-directory: apps/electron
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" > .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env

      - name: Build electron-vite bundles
        working-directory: apps/electron
        run: npm run build

      - name: Package Windows installer
        working-directory: apps/electron
        run: npx electron-builder --win --publish never

      - name: Upload installer as release artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/electron/dist-installer/DlesNight-Setup-*.exe
            apps/electron/dist-installer/latest.yml
